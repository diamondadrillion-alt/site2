<!DOCTYPE html>
<html lang="en">

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

#overlay {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#main.blurred {
  filter: blur(10px);
}

/* VIDEO */
video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: -1;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  right: 0;
  display: flex;
  padding: 10px;
  z-index: 2;
}

.tab {
  margin-left: 10px;
  padding: 8px 12px;
  background: #333;
  cursor: pointer;
}

.tab.active {
  background: white;
  color: black;
}

/* TEXT */
.text-box {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 20px 30px;
  text-align: center;
  z-index: 1;
  font-size: 48px;
  font-weight: bold;
  background: linear-gradient(90deg, red, purple);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 20px rgba(255, 0, 0, 0.7),
               0 0 30px rgba(128, 0, 128, 0.7);
}

/* ABOUT BOX */
.about-box {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  max-width: 600px;
  width: 80%;
  padding: 30px;

  border-radius: 15px;

  background: linear-gradient(135deg, #3a0000, #2a003a);
  color: White;

  font-size: 18px;
  line-height: 1.6;

  z-index: 3;
  display: none;
}
</style>
</head>

<body>
