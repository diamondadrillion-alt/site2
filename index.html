<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Media Tabs</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
  }

  /* LOCK SCREEN */
  #overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    backdrop-filter: blur(15px);
  }

  #enterBtn {
    padding: 15px 25px;
    font-size: 18px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
    border-radius: 10px;
  }

  /* MAIN CONTENT BLUR BEFORE ENTER */
  .blurred {
    filter: blur(15px);
    pointer-events: none;
  }

  /* TOP BAR */
  header {
    display: flex;
    justify-content: flex-end;
    padding: 15px;
    background: #222;
    position: sticky;
    top: 0;
  }

  .tab {
    margin-left: 10px;
    padding: 8px 12px;
    cursor: pointer;
    background: #333;
    border-radius: 6px;
  }

  .tab.active {
    background: white;
    color: black;
  }

  /* CONTENT */
  .content {
    text-align: center;
    padding: 50px 20px;
  }

  img {
    width: 100%;
    max-width: 500px;
    border-radius: 10px;
  }

  audio {
    display: none;
  }
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="overlay">
  <button id="enterBtn">Click to Enter</button>
</div>

<div id="main" class="blurred">

<header>
  <div class="tab active" onclick="switchTab(1)">Section 1</div>
  <div class="tab" onclick="switchTab(2)">Section 2</div>
  <div class="tab" onclick="switchTab(3)">Section 3</div>
</header>

<div class="content">
  <img id="img" src="image1.jpg">

  <audio id="audio1" src="audio1.mp3"></audio>
  <audio id="audio2" src="audio2.mp3"></audio>
  <audio id="audio3" src="audio3.mp3"></audio>
</div>

</div>

<script>
let current = 1;

const images = {
  1: "image1.jpg",
  2: "image2.jpg",
  3: "image3.jpg"
};

const audios = {
  1: document.getElementById("audio1"),
  2: document.getElementById("audio2"),
  3: document.getElementById("audio3")
};

function stopAll() {
  Object.values(audios).forEach(a => {
    a.pause();
    a.currentTime = 0;
  });
}

function switchTab(num) {
  current = num;

  document.getElementById("img").src = images[num];

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab")[num - 1].classList.add("active");

  stopAll();

  audios[num].play();
}

/* FIRST ENTER */
document.getElementById("enterBtn").addEventListener("click", () => {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("main").classList.remove("blurred");

  // auto play first section audio
  audios[1].play();
});
</script>

</body>
</html>
