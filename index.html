<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>762 gang</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

#overlay {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#main.blurred {
  filter: blur(10px);
}

/* FULLSCREEN VIDEO */
video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: -1;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  right: 0;
  display: flex;
  padding: 10px;
  z-index: 2;
}

.tab {
  margin-left: 10px;
  padding: 8px 12px;
  background: #333;
  cursor: pointer;
}

.tab.active {
  background: white;
  color: black;
}

/* IP ADDRESS DISPLAY - Only for Tab 1 */
#ipDisplay {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.7);
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 18px;
  font-weight: bold;
  color: #ff4444;
  z-index: 3;
  display: none; /* Hidden by default */
  text-shadow: 0 0 10px rgba(255, 68, 68, 0.8);
}

/* CENTER TEXT BOX */
.text-box {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 20px 30px;
  text-align: center;
  z-index: 1;
  font-size: 48px;
  font-weight: bold;
  background: linear-gradient(90deg, red, purple);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 20px rgba(255, 0, 0, 0.7),
               0 0 30px rgba(128, 0, 128, 0.7);
}
</style>
</head>

<body>

<div id="overlay">
  <button id="enterBtn">Enter</button>
</div>

<div id="main" class="blurred">

  <!-- IP Display (only visible on Tab 1) -->
  <div id="ipDisplay"> <span id="ipAddress">Loading...</span></div>

  <header>
    <div class="tab active" onclick="switchTab(1)">1</div>
    <div class="tab" onclick="switchTab(2)">2</div>
    <div class="tab" onclick="switchTab(3)">3</div>
  </header>

  <video id="video" autoplay loop muted playsinline></video>
  <audio id="audio" loop></audio>

  <div id="textBox" class="text-box"></div>

</div>

<script>
// IP fetching function (using a public API)
async function getUserIP() {
  try {
    const response = await fetch('https://api.ipify.org?format=json');
    const data = await response.json();
    document.getElementById('ipAddress').textContent = data.ip;
  } catch (error) {
    document.getElementById('ipAddress').textContent = 'Unable to fetch IP';
  }
}

const data = {
  1: {
    video: "https://file.garden/aeFV1O6P_R_1-nv5/ssstik.io_@1archiver_1776383596465.mp4",
    audio: "audio/audio1.mp3",
    text: "Swat is on the way faggot"
  },
  2: {
    video: "https://file.garden/aeFV1O6P_R_1-nv5/ssstik.io_@lesha_killerkriper2014_1776380665273.mp4",
    audio: "audio/audio2.mp3",
    text: "762 owns you like a nigger in 1782"
  },
  3: {
    video: "https://file.garden/aeFV1O6P_R_1-nv5/ssstik.io_@l88ss_1776453557512.mp4",
    audio: "audio/audio3.mp3",
    text: "We hate jews,niggers,pedophiles and muslims"
  }
};

const videoEl = document.getElementById("video");
const audioEl = document.getElementById("audio");
const textBox = document.getElementById("textBox");
const enterBtn = document.getElementById("enterBtn");
const ipDisplay = document.getElementById("ipDisplay");

function switchTab(num) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab")[num - 1].classList.add("active");

  // VIDEO
  videoEl.pause();
  videoEl.src = data[num].video;
  videoEl.load();
  videoEl.play().catch(()=>{});

  // AUDIO
  audioEl.pause();
  audioEl.currentTime = 0;
  audioEl.src = data[num].audio;
  audioEl.play().catch(()=>{});

  // TEXT
  textBox.textContent = data[num].text;

  // Show IP only on Tab 1
  if (num === 1) {
    ipDisplay.style.display = "block";
  } else {
    ipDisplay.style.display = "none";
  }
}

enterBtn.onclick = () => {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("main").classList.remove("blurred");

  // Start first tab
  switchTab(1);

  // Fetch IP when entering
  getUserIP();
};
</script>

</body>
</html>
