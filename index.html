<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>762extorters.com</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: white;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }
        .hero {
            height: 100vh;
            background-image: url('https://file.garden/aeFV1O6P_R_1-nv5/ssstik.io_@1archiver_1776383596465.gif'); /* ← CHANGE THIS */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            filter: blur(20px);           /* Starts blurred */
            transition: filter 1s ease;   /* Smooth unblur */
        }
        .hero.unblurred {
            filter: blur(0px);
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
        }
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
        }
        h1 {
            font-size: 5.5rem;
            margin: 0 0 20px 0;
            text-shadow: 0 0 30px #ff00ff;
        }
        p {
            font-size: 2.4rem;
            margin: 0;
            text-shadow: 0 0 20px #000;
            transition: opacity 0.6s ease;
        }
        p.hidden {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="hero" id="hero">
        <div class="content">
            <h1>762 will rape you like a nigger in 1782</h1>
        </div>
    </div>

    <audio id="bgmusic" loop preload="auto">
        <source src="https://file.garden/aeFV1O6P_R_1-nv5/ssstik.io_1776383593408.mp3" type="audio/mpeg">
    </audio>

    <script>
        const hero = document.getElementById('hero');
        const hint = document.getElementById('hint');
        const audio = document.getElementById('bgmusic');

        // Start music muted on load
        window.addEventListener('load', () => {
            audio.volume = 0.9;
            audio.muted = true;
            audio.play().catch(() => {});
        });

        // Click anywhere → unblur + play music + hide text
        document.getElementById('hero').addEventListener('click', () => {
            hero.classList.add('unblurred');   // Remove blur
            audio.muted = false;               // Turn sound on
            audio.play();

            // Hide the "click anywhere" text
            hint.classList.add('hidden');
        });
    </script>
</body>
</html>
