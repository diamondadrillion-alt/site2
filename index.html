<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>762extorters.com</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }
        .hero {
            height: 100vh; /* Full screen height */
            background-image: url('niiga.png'); /* Replace with your image name */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); /* Dark overlay so text is readable */
        }
        .content {
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: 4rem;
            margin: 0;
        }
        p {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="content">
            <h1>Welcome to 762extorters.com</h1>
            <p>The biggest joke on the internet 😂</p>
            <!-- Add more text or buttons here -->
        </div>
    </div>
</body>
</html>
