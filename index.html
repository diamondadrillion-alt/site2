<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Media Tabs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    /* Top bar */
    header {
      display: flex;
      justify-content: flex-end;
      padding: 15px;
      background: #222;
      position: sticky;
      top: 0;
    }

    .tab {
      margin-left: 10px;
      padding: 8px 12px;
      cursor: pointer;
      background: #333;
      border-radius: 6px;
      transition: 0.2s;
    }

    .tab:hover {
      background: #555;
    }

    .tab.active {
      background: white;
      color: black;
    }

    /* Sections */
    .section {
      display: none;
      text-align: center;
      padding: 50px 20px;
    }

    .section.active {
      display: block;
    }

    img {
      width: 100%;
      max-width: 500px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    audio {
      width: 100%;
      max-width: 500px;
    }
  </style>
</head>

<body>

<header>
  <div class="tab active" onclick="showSection(1)">Section 1</div>
  <div class="tab" onclick="showSection(2)">Section 2</div>
  <div class="tab" onclick="showSection(3)">Section 3</div>
</header>

<!-- Section 1 -->
<div class="section active" id="section1">
  <img src="image1.jpg" alt="Image 1">
  <audio controls>
    <source src="audio1.mp3" type="audio/mpeg">
  </audio>
</div>

<!-- Section 2 -->
<div class="section" id="section2">
  <img src="image2.jpg" alt="Image 2">
  <audio controls>
    <source src="audio2.mp3" type="audio/mpeg">
  </audio>
</div>

<!-- Section 3 -->
<div class="section" id="section3">
  <img src="image3.jpg" alt="Image 3">
  <audio controls>
    <source src="audio3.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
  function showSection(num) {
    // hide all sections
    document.querySelectorAll('.section').forEach(sec => {
      sec.classList.remove('active');
    });

    // remove active tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.classList.remove('active');
    });

    // show selected section
    document.getElementById('section' + num).classList.add('active');
    document.querySelectorAll('.tab')[num - 1].classList.add('active');
  }
</script>

</body>
</html>
