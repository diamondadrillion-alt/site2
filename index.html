<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Tabs</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

#overlay {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#main.blurred {
  filter: blur(10px);
}

/* FULLSCREEN VIDEO */
video {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  z-index: -1;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  right: 0;
  display: flex;
  padding: 10px;
  z-index: 2;
}

.tab {
  margin-left: 10px;
  padding: 8px 12px;
  background: #333;
  cursor: pointer;
}

.tab.active {
  background: white;
  color: black;
}

/* CENTER TEXT BOX */
.text-box {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.6);
  padding: 20px 30px;
  border-radius: 10px;
  font-size: 24px;
  text-align: center;
  z-index: 1;
}
</style>
</head>

<body>

<div id="overlay">
  <button id="enterBtn">Enter</button>
</div>

<div id="main" class="blurred">

<header>
  <div class="tab active" onclick="switchTab(1)">1</div>
  <div class="tab" onclick="switchTab(2)">2</div>
  <div class="tab" onclick="switchTab(3)">3</div>
</header>

<video id="video" autoplay loop muted playsinline></video>
<audio id="audio" loop></audio>

<div id="textBox" class="text-box"></div>

</div>

<script>
const data = {
  1: {
    video: "https://file.garden/aeFV1O6P_R_1-nv5/ssstik.io_@1archiver_1776383596465.mp4",
    audio: "audio/audio1.mp3",
    text: "Welcome to Section 1"
  },
  2: {
    video: "https://file.garden/aeFV1O6P_R_1-nv5/ssstik.io_@lesha_killerkriper2014_1776380665273.mp4",
    audio: "audio/audio2.mp3",
    text: "This is Section 2"
  },
  3: {
    video: "https://your-link/video3.mp4",
    audio: "audio/audio3.mp3",
    text: "You're viewing Section 3"
  }
};

const videoEl = document.getElementById("video");
const audioEl = document.getElementById("audio");
const textBox = document.getElementById("textBox");
const enterBtn = document.getElementById("enterBtn");

function switchTab(num) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab")[num - 1].classList.add("active");

  // VIDEO
  videoEl.pause();
  videoEl.src = data[num].video;
  videoEl.load();
  videoEl.play().catch(()=>{});

  // AUDIO (LOOPS AUTOMATICALLY)
  audioEl.pause();
  audioEl.currentTime = 0;
  audioEl.src = data[num].audio;
  audioEl.play().catch(()=>{});

  // TEXT
  textBox.textContent = data[num].text;
}

enterBtn.onclick = () => {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("main").classList.remove("blurred");

  // START FIRST TAB
  videoEl.src = data[1].video;
  videoEl.play().catch(()=>{});

  audioEl.src = data[1].audio;
  audioEl.play().catch(()=>{});

  textBox.textContent = data[1].text;
};
</script>

</body>
</html>
