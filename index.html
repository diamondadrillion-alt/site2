<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multi Media Sections</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #222;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    section {
      padding: 60px 20px;
      border-bottom: 1px solid #333;
    }

    h2 {
      margin-bottom: 20px;
    }

    video {
      width: 100%;
      max-width: 600px;
      display: block;
      margin-bottom: 15px;
    }

    audio {
      width: 100%;
      max-width: 600px;
    }
  </style>
</head>

<body>

<header>
  <h1>My Media Website</h1>
  <nav>
    <a href="#section1">Section 1</a>
    <a href="#section2">Section 2</a>
    <a href="#section3">Section 3</a>
  </nav>
</header>

<section id="section1">
  <h2>Section 1: Intro</h2>

  <video controls>
    <source src="video1.mp4" type="video/mp4">
    Your browser does not support video.
  </video>

  <audio controls>
    <source src="audio1.mp3" type="audio/mpeg">
    Your browser does not support audio.
  </audio>
</section>

<section id="section2">
  <h2>Section 2: Middle</h2>

  <video controls>
    <source src="video2.mp4" type="video/mp4">
  </video>

  <audio controls>
    <source src="audio2.mp3" type="audio/mpeg">
  </audio>
</section>

<section id="section3">
  <h2>Section 3: Ending</h2>

  <video controls>
    <source src="video3.mp4" type="video/mp4">
  </video>

  <audio controls>
    <source src="audio3.mp3" type="audio/mpeg">
  </audio>
</section>

</body>
</html>
