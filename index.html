<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Media Tabs</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    backdrop-filter: blur(15px);
  }

  #enterBtn {
    padding: 15px 25px;
    font-size: 18px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
    border-radius: 10px;
  }

  .blurred {
    filter: blur(15px);
    pointer-events: none;
  }

  header {
    display: flex;
    justify-content: flex-end;
    padding: 15px;
    background: #222;
    position: sticky;
    top: 0;
  }

  .tab {
    margin-left: 10px;
    padding: 8px 12px;
    cursor: pointer;
    background: #333;
    border-radius: 6px;
  }

  .tab.active {
    background: white;
    color: black;
  }

  .content {
    text-align: center;
    padding: 50px 20px;
  }

  img {
    width: 100%;
    max-width: 500px;
    border-radius: 10px;
  }

  audio {
    display: none;
  }
</style>
</head>

<body>

<div id="overlay">
  <button id="enterBtn">Click to Enter</button>
</div>

<div id="main" class="blurred">

<header>
  <div class="tab active" onclick="switchTab(1)">Section 1</div>
  <div class="tab" onclick="switchTab(2)">Section 2</div>
  <div class="tab" onclick="switchTab(3)">Section 3</div>
</header>

<div class="content">
  <img id="img" src="image1.jpg" />

  <audio id="audio"></audio>
</div>

</div>

<script>
let current = 1;

const data = {
  1: { 
    img: "https://file.garden/aeFV1O6P_R_1-nv5/ssstik.io_@1archiver_1776383596465.gif", 
    audio: "audio/audio1.mp3" 
  },
  2: { 
    img: "https://file.garden/aeFV1O6P_R_1-nv5/ssstik.io_@lesha_killerkriper2014_1776380665273.gif", 
    audio: "audio/audio2.mp3" 
  },
  3: { 
    img: "https://example.com/gif3.gif", 
    audio: "audio/audio3.mp3" 
  }
};

const imgEl = document.getElementById("img");
const audioEl = document.getElementById("audio");

function switchTab(num) {
  current = num;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab")[num - 1].classList.add("active");

  imgEl.src = data[num].img;

  audioEl.pause();
  audioEl.currentTime = 0;
  audioEl.src = data[num].audio;

  // play only after user interaction exists
  audioEl.play().catch(() => {
    console.log("Autoplay blocked");
  });
}

/* FIRST CLICK UNLOCK */
document.getElementById("enterBtn").addEventListener("click", () => {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("main").classList.remove("blurred");

  // FORCE FIRST STATE LOAD
  imgEl.src = data[1].img;
  audioEl.src = data[1].audio;

  audioEl.play().catch(() => {
    console.log("Autoplay blocked even after click");
  });
});
</script>

</body>
</html>
